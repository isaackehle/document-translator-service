name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: ✅ Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  test:
    name: 🧪 Test & Coverage (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: pre-commit
    strategy:
      fail-fast: false # don't cancel other Python versions if one fails
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"] # support 3.9+ as in pyproject.toml

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('**/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Ensure ruff and pytest-asyncio are latest
          pip install --upgrade 'ruff>=0.8.6,<0.9' 'pytest-asyncio>=0.23.0,<0.25'

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format (check only)
        run: ruff format --check .

      - name: Run tests
        run: |
          pytest --cov=. --cov-report=term-missing --cov-report=xml --strict-markers

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          flags: unittests
          name: codecov-umbrella
          env_vars: PYTHON_VERSION
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
