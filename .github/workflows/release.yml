name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: 🏷️ Auto-Bump Version & Changelog
    runs-on: ubuntu-latest
    # Skip workflow when the commit was authored by github-actions[bot] to prevent
    # infinite trigger loops — the version bump push would otherwise re-trigger this workflow
    if: github.event.head_commit.author.name != 'github-actions[bot]'
    permissions:
      contents: write
    env:
      SECRETS_BUMPER: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install commitizen
        run: pip install commitizen==4.16.3

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for eligible commits
        id: check
        run: |
          # Dry-run to see if there are eligible commits to bump
          if cz bump --dry-run 2>&1 | grep -q "No eligible commits"; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No eligible commits found. Skipping version bump."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and update changelog
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # cz bump automatically:
          # 1. Analyzes commits since last tag using conventional commit rules
          # 2. Determines bump type (MAJOR for breaking, MINOR for feat, PATCH for fix)
          # 3. Updates version in pyproject.toml (pep621 provider)
          # 4. Updates CHANGELOG.md (update_changelog_on_bump = true in pyproject.toml)
          # 5. Creates a git commit and tag
          cz bump --yes

      - name: Extract version from tag
        if: steps.check.outputs.has_changes == 'true'
        id: version
        run: |
          # Read the version from the tag cz bump just created (more reliable than parsing CLI output)
          NEW_VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push version bump and tag
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --follow-tags

      - name: Generate GitHub Release
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.new_version }}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --repo "${{ github.repository }}"
